<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; }
        ::-webkit-scrollbar { display: none; }
        #bgWrap {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        button {
            transition: transform 0.08s ease, background-color 0.2s ease;
        }
        button:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>
    <div id="bgWrap" class="rounded-full backdrop-blur-md shadow-xl border flex items-center justify-between p-2 pl-3 gap-3 transition-all duration-300 text-white bg-blue-600/50 border-blue-400/50">
        <div class="flex items-center gap-2 overflow-hidden pointer-events-none select-none">
            <div id="clockWrapper" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 animate-pulse bg-white/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div id="titleCol" class="min-w-0 flex flex-col">
                <span class="text-[9px] uppercase opacity-70 tracking-wider leading-none">Focusing</span>
                <span id="titleText" class="text-sm font-bold truncate max-w-[130px] pr-2">🍅 Focus Timer</span>
            </div>
        </div>

        <div class="flex items-center gap-2 shrink-0 h-full">
            <span id="timerText" class="font-mono font-bold text-lg tabular-nums pointer-events-none select-none mr-2">
                25:00
            </span>
            
            <div id="controlsWrap" class="flex items-center gap-1.5 bg-black/50 rounded-full p-1 shadow-inner border border-black/20 transition-all duration-300 transform origin-right">
                <button id="pauseBtn" class="w-8 h-8 rounded-full flex items-center justify-center transition bg-white/15 hover:bg-white/25 text-white shadow-sm" title="Pause/Resume">
                    <span id="pauseIconWrap">
                        <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    </span>
                </button>
                <button id="resetBtn" class="w-8 h-8 rounded-full flex items-center justify-center bg-white/15 hover:bg-white/25 transition text-yellow-400 shadow-sm" title="Reset Timer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                </button>
                <button id="stopBtn" class="w-8 h-8 rounded-full flex items-center justify-center bg-white/15 hover:bg-white/25 transition text-green-400 shadow-sm" title="Log & Finish">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                </button>
                <button id="collapseBtn" class="w-8 h-8 rounded-full flex items-center justify-center bg-white/5 hover:bg-white/15 transition text-gray-300 shadow-sm" title="Minimize">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6"/><path d="M20 10h-6V4"/><path d="M14 10l7-7"/><path d="M3 21l7-7"/></svg>
                </button>
            </div>
            
            <button id="expandBtn" class="hidden w-8 h-8 shrink-0 rounded-full items-center justify-center bg-black/50 text-white border border-white/20 shadow-sm transition" title="Expand">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
            </button>
        </div>
    </div>
    
    <script>
        let isCollapsed = false;
        let isRunningState = true;

        document.addEventListener("DOMContentLoaded", () => {
            console.log("Overlay initialized, binding listeners");

            document.getElementById("pauseBtn").addEventListener("click", () => {
                console.log("Pause/Resume clicked. Current state:", isRunningState);
                if (isRunningState) {
                    if (window.OverlayManager) window.OverlayManager.pauseTimer();
                } else {
                    if (window.OverlayManager) window.OverlayManager.resumeTimer();
                }
            });

            document.getElementById("resetBtn").addEventListener("click", () => {
                console.log("Reset clicked");
                if (window.OverlayManager) window.OverlayManager.resetTimer();
            });

            document.getElementById("stopBtn").addEventListener("click", () => {
                console.log("Stop clicked");
                if (window.OverlayManager) window.OverlayManager.stopTimer();
            });

            document.getElementById("collapseBtn").addEventListener("click", toggleCollapse);
            document.getElementById("expandBtn").addEventListener("click", toggleCollapse);
        });

        function toggleCollapse() {
            isCollapsed = !isCollapsed;
            console.log("Toggle collapse. New state:", isCollapsed);
            const controlsWrap = document.getElementById('controlsWrap');
            const expandBtn = document.getElementById('expandBtn');
            const titleCol = document.getElementById('titleCol');
            
            if (isCollapsed) {
                controlsWrap.classList.add('hidden');
                expandBtn.classList.remove('hidden');
                expandBtn.classList.add('flex');
                if(titleCol) titleCol.classList.add('hidden');
                if (window.OverlayManager) {
                   window.OverlayManager.setCollapsed(true);
                }
            } else {
                controlsWrap.classList.remove('hidden');
                expandBtn.classList.add('hidden');
                expandBtn.classList.remove('flex');
                if(titleCol) titleCol.classList.remove('hidden');
                if (window.OverlayManager) {
                   window.OverlayManager.setCollapsed(false);
                }
            }
        }

        function updateOverlay(time, title, type, isRunning, theme) {
            console.log("updateOverlay called", {time, title, isRunning, theme});
            isRunningState = isRunning;
            
            document.getElementById('timerText').innerText = time;
            document.getElementById('titleText').innerText = title;
            
            const bgWrap = document.getElementById('bgWrap');
            const clockWrapper = document.getElementById('clockWrapper');
            const pauseBtn = document.getElementById('pauseBtn');
            const pauseIconWrap = document.getElementById('pauseIconWrap');

            const baseWrapperClasses = "rounded-full backdrop-blur-md shadow-xl border flex items-center justify-between p-2 pl-3 gap-3 transition-all duration-300 text-white";

            if (isRunning) {
                let themeClasses = 'bg-blue-600/50 border-blue-400/50';
                if (theme === 'red') themeClasses = 'bg-red-600/50 border-red-400/50';
                else if (theme === 'purple') themeClasses = 'bg-purple-600/50 border-purple-400/50';
                else if (theme === 'green') themeClasses = 'bg-green-600/50 border-green-400/50';
                else if (theme === 'orange') themeClasses = 'bg-orange-600/50 border-orange-400/50';
                else if (theme === 'fuchsia') themeClasses = 'bg-fuchsia-600/50 border-fuchsia-400/50';
                else if (theme === 'cyan') themeClasses = 'bg-cyan-600/50 border-cyan-400/50';
                else if (theme === 'teal') themeClasses = 'bg-teal-600/50 border-teal-400/50';

                bgWrap.className = baseWrapperClasses + ' ' + themeClasses;
                clockWrapper.className = "w-8 h-8 rounded-full flex items-center justify-center shrink-0 animate-pulse bg-white/20";
                
                pauseBtn.className = "w-8 h-8 rounded-full flex items-center justify-center transition bg-white/15 hover:bg-white/25 text-white";
                pauseIconWrap.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
            } else {
                // Paused / stopped state
                bgWrap.className = baseWrapperClasses + ' bg-gray-800/80 border-gray-600/50';
                clockWrapper.className = "w-8 h-8 rounded-full flex items-center justify-center shrink-0 bg-black/20";
                
                pauseBtn.className = "w-8 h-8 rounded-full flex items-center justify-center transition bg-white text-black hover:bg-gray-200 shadow-md";
                pauseIconWrap.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
            }
        }
    </script>
</body>
</html>
